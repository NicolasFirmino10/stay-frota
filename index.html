<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:14px;background:#F0F2F5;color:#1a1a2e;min-height:100vh}
:root{
  --blue:#1B4FD8;--blue-light:#EEF2FF;--blue-mid:#3B6FE8;
  --green:#16A34A;--green-light:#DCFCE7;
  --amber:#D97706;--amber-light:#FEF3C7;
  --red:#DC2626;--red-light:#FEE2E2;
  --purple:#7C3AED;--purple-light:#EDE9FE;
  --gray:#64748B;--gray-light:#F1F5F9;
  --border:#E2E8F0;--white:#FFFFFF;
  --header:#0F172A;--sidebar-w:220px;
}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--header);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-logo .brand{font-size:18px;font-weight:700;color:#fff;letter-spacing:0.5px}
.sidebar-logo .sub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0}
.nav-section{padding:8px 16px 4px;font-size:10px;font-weight:600;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-radius:0;transition:all 0.15s;font-size:13px;color:rgba(255,255,255,0.7);border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.nav-item.active{background:rgba(27,79,216,0.4);color:#fff;border-left-color:#3B6FE8}
.nav-item .icon{font-size:16px;width:18px;text-align:center}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:16px;font-weight:600;color:var(--header)}
.page-sub{font-size:12px;color:var(--gray);margin-top:1px}
.content{padding:24px 28px;flex:1}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-mid)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:#fff;border:1px solid var(--border);color:var(--header)}.btn-outline:hover{background:var(--gray-light)}
.btn-ghost{background:transparent;border:none;color:var(--gray)}.btn-ghost:hover{color:var(--header);background:var(--gray-light)}
.card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:var(--header)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.kpi-val{font-size:28px;font-weight:700;margin:4px 0}
.kpi-label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:#F8FAFC;font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid #F1F5F9;font-size:13px;vertical-align:middle}
tr:hover td{background:#FAFBFD}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-light);color:#15803D}
.badge-amber{background:var(--amber-light);color:#92400E}
.badge-red{background:var(--red-light);color:#991B1B}
.badge-blue{background:var(--blue-light);color:#1E40AF}
.badge-purple{background:var(--purple-light);color:#5B21B6}
.badge-gray{background:#F1F5F9;color:#475569}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:600;color:var(--header);margin-bottom:5px}
input,select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--header);outline:none;transition:border 0.15s;background:#fff}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(27,79,216,0.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:700;color:var(--header)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:16px}
.alert-amber{background:var(--amber-light);color:#92400E;border-left:3px solid var(--amber)}
.alert-blue{background:var(--blue-light);color:#1E40AF;border-left:3px solid var(--blue)}
.alert-red{background:var(--red-light);color:#991B1B;border-left:3px solid var(--red)}
.alert-green{background:var(--green-light);color:#15803D;border-left:3px solid var(--green)}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.action-btns{display:flex;gap:6px}
.suggested{background:#DCFCE7;border:1px solid #86EFAC;border-radius:6px}
.home-nav-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:20px}
.home-nav-item{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;text-align:center;transition:all 0.2s}
.home-nav-item:hover{border-color:var(--blue);box-shadow:0 4px 12px rgba(27,79,216,0.1);transform:translateY(-2px)}
.home-nav-item .nav-icon{font-size:28px;margin-bottom:8px}
.home-nav-item .nav-label{font-size:13px;font-weight:600;color:var(--header)}
.top5-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.top5-rank{width:28px;height:28px;border-radius:50%;background:var(--blue-light);color:var(--blue);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top5-rank.r1{background:#FEF3C7;color:#D97706}
.top5-rank.r2{background:#F1F5F9;color:#475569}
.top5-rank.r3{background:#FEF2F2;color:#DC2626}
.progress-bar{height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:var(--blue);border-radius:3px}
.lock-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.7);z-index:300;display:flex;align-items:center;justify-content:center}
.lock-box{background:#fff;border-radius:16px;padding:32px;width:320px;text-align:center}
.lock-icon{font-size:40px;margin-bottom:12px}
.lock-title{font-size:18px;font-weight:700;color:var(--header);margin-bottom:6px}
.lock-sub{font-size:13px;color:var(--gray);margin-bottom:20px}
.empty-state{text-align:center;padding:48px 20px;color:var(--gray)}
.empty-icon{font-size:40px;margin-bottom:12px}
.fb-status{position:fixed;bottom:16px;right:16px;background:#0F172A;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:6px;z-index:999;opacity:0;transition:opacity 0.3s}
.fb-status.show{opacity:1}
.fb-dot{width:8px;height:8px;border-radius:50%;background:#22C55E}
.fb-dot.syncing{background:#F59E0B;animation:pulse 1s infinite}
.fb-dot.error{background:#EF4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.loading-screen{position:fixed;inset:0;background:#0F172A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;color:#fff}
.loading-logo{font-size:48px;margin-bottom:16px}
.loading-title{font-size:24px;font-weight:700;margin-bottom:8px}
.loading-sub{font-size:14px;color:rgba(255,255,255,0.5)}
.loading-bar{width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:24px;overflow:hidden}
.loading-fill{height:100%;background:var(--blue);border-radius:2px;animation:load 2s ease-in-out infinite}
@keyframes load{0%{width:0%}100%{width:100%}}
</style>
</head>
<body>

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);

// ─── COLLECTIONS ─────────────────────────────────────────────────────────────
const COLS = {

};

window.state = {

  _loaded: false

// ─── STATUS UI ───────────────────────────────────────────────────────────────
function fbStatus(msg, type='sync') {
  const el = document.getElementById('fb-status');
  const dot = document.getElementById('fb-dot');
  const msgEl = document.getElementById('fb-msg');
  msgEl.textContent = msg;
  dot.className = 'fb-dot' + (type==='sync'?' syncing':type==='error'?' error':'');
  el.classList.add('show');
  if(type==='ok') setTimeout(()=>el.classList.remove('show'), 2500);
}

// ─── FIRESTORE HELPERS ───────────────────────────────────────────────────────
async function fbLoad(colName) {
  const snap = await getDocs(collection(db, colName));
  return snap.docs.map(d => ({ ...d.data(), _fbId: d.id }));
}

async function fbSave(colName, obj) {
  fbStatus('Salvando...', 'sync');
  try {
    const id = String(obj.id || obj._fbId || Date.now());
    const data = { ...obj };
    delete data._fbId;
    await setDoc(doc(db, colName, id), data);
    fbStatus('Salvo ✓', 'ok');
  } catch(e) {
    fbStatus('Erro ao salvar', 'error');
    console.error(e);
  }
}

async function fbDelete(colName, id) {
  fbStatus('Removendo...', 'sync');
  try {
    await deleteDoc(doc(db, colName, String(id)));
    fbStatus('Removido ✓', 'ok');
  } catch(e) {
    fbStatus('Erro ao remover', 'error');
    console.error(e);
  }
}

async function fbSaveMeta(key, value) {
  await setDoc(doc(db, COLS.meta, key), { value });
}

async function fbGetMeta(key, defaultVal) {
  const snap = await getDoc(doc(db, COLS.meta, key));
  if(snap.exists()) return snap.data().value;
  return defaultVal;
}

// ─── SEED DATA (only if empty) ────────────────────────────────────────────────
const SEED_VEICULOS = [
  {id:1,placa:'ABC-1234',modelo:'Fiat Strada 1.3',motorista:'Carlos Silva',ano:2022,cor:'Branco',obs:''},
  {id:2,placa:'DEF-5678',modelo:'VW Gol 1.0',motorista:'Maria Oliveira',ano:2021,cor:'Prata',obs:''},

  {id:2,num:'OS-002',data:'2025-06-05',placa:'DEF-5678',modelo:'VW Gol 1.0',motorista:'Maria Oliveira',km:32100,problema:'Troca de óleo e filtro',status:'Execução',prioridade:'Normal'},
  {id:3,num:'OS-003',data:'2025-06-10',placa:'GHI-9012',modelo:'Hyundai HB20 1.0',motorista:'João Santos',km:78500,problema:'Ar condicionado não funciona',status:'Aguardando Aprovação',prioridade:'Alta'},
  {id:4,num:'OS-004',data:'2025-06-15',placa:'JKL-3456',modelo:'Renault Kwid 1.0',motorista:'Ana Lima',km:15300,problema:'Revisão preventiva 15.000 km',status:'Cotação',prioridade:'Normal'},
  {id:5,num:'OS-005',data:'2025-06-18',placa:'MNO-7890',modelo:'Chevrolet S10 2.8',motorista:'Pedro Rocha',km:52000,problema:'Pneu traseiro direito furado',status:'Diagnóstico/Oficina',prioridade:'Urgente'},
];
const SEED_COTACOES = [
  {id:1,os:'OS-003',peca:'Compressor Ar Cond.',fornecedor:'Oficina Central Fortaleza',valor:850,prazo:5,pgto:'Boleto 30d',obs:'',escolhido:true},

];

];

async function seedIfEmpty(colName, seedData) {
  const existing = await getDocs(collection(db, colName));
  if(existing.empty) {
    const batch = writeBatch(db);
    seedData.forEach(item => {
      const d = { ...item };
      batch.set(doc(db, colName, String(item.id)), d);
    });
    await batch.commit();
    return seedData;
  }
  return existing.docs.map(d => ({ ...d.data() }));
}

// ─── LOAD ALL DATA ────────────────────────────────────────────────────────────
async function loadAllData() {
  try {
    fbStatus('Carregando dados...', 'sync');

    const [veiculos, os, cotacoes, aprovacoes, manutencoes, pecas, oficinas, fornecedores, osCounter] = await Promise.all([
      seedIfEmpty(COLS.veiculos, SEED_VEICULOS),
      seedIfEmpty(COLS.os, SEED_OS),
      seedIfEmpty(COLS.cotacoes, SEED_COTACOES),
      seedIfEmpty(COLS.aprovacoes, SEED_APROVACOES),
      seedIfEmpty(COLS.manutencoes, SEED_MANUTENCOES),
      seedIfEmpty(COLS.pecas, SEED_PECAS),
      seedIfEmpty(COLS.oficinas, SEED_OFICINAS),
      fbLoad(COLS.fornecedores),
      fbGetMeta('osCounter', 6)
    ]);

    // Normalize numeric IDs
    const norm = arr => arr.map(x => ({
      ...x,
      id: Number(x.id) || x.id,
      km: x.km !== undefined ? Number(x.km) : undefined,
      valor: x.valor !== undefined ? Number(x.valor) : undefined,
      vlrPecas: x.vlrPecas !== undefined ? Number(x.vlrPecas) : undefined,
      vlrMO: x.vlrMO !== undefined ? Number(x.vlrMO) : undefined,
      vlrUnit: x.vlrUnit !== undefined ? Number(x.vlrUnit) : undefined,
      qtde: x.qtde !== undefined ? Number(x.qtde) : undefined,
      prazo: x.prazo !== undefined ? Number(x.prazo) : undefined,
    }));

    window.state.veiculos = norm(veiculos);
    window.state.os = norm(os);
    window.state.cotacoes = norm(cotacoes);
    window.state.aprovacoes = norm(aprovacoes);
    window.state.manutencoes = norm(manutencoes);
    window.state.pecas = norm(pecas);
    window.state.oficinas = norm(oficinas);
    window.state.fornecedores = norm(fornecedores);
    window.state.osCounter = Number(osCounter);
    window.state._loaded = true;

    fbStatus('Conectado ✓', 'ok');

    // Hide loading, show app
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    render();

    // Start real-time listeners
    setupListeners();

  } catch(e) {
    console.error('Firebase load error:', e);
    fbStatus('Erro de conexão', 'error');
    document.getElementById('loading-screen').querySelector('.loading-sub').textContent = '❌ Erro: ' + e.message;
  }
}

// ─── REAL-TIME LISTENERS ──────────────────────────────────────────────────────
function setupListeners() {
  const watch = (colName, stateKey) => {
    onSnapshot(collection(db, colName), snap => {
      if(!window.state._loaded) return;
      const items = snap.docs.map(d => {
        const data = d.data();
        return {
          ...data,
          id: Number(data.id) || data.id,
          km: data.km !== undefined ? Number(data.km) : undefined,
          valor: data.valor !== undefined ? Number(data.valor) : undefined,
          vlrPecas: data.vlrPecas !== undefined ? Number(data.vlrPecas) : undefined,
          vlrMO: data.vlrMO !== undefined ? Number(data.vlrMO) : undefined,
          vlrUnit: data.vlrUnit !== undefined ? Number(data.vlrUnit) : undefined,
          qtde: data.qtde !== undefined ? Number(data.qtde) : undefined,
          prazo: data.prazo !== undefined ? Number(data.prazo) : undefined,
        };
      });
      window.state[stateKey] = items;
      render();
    });
  };

  watch(COLS.veiculos, 'veiculos');
  watch(COLS.os, 'os');
  watch(COLS.cotacoes, 'cotacoes');
  watch(COLS.aprovacoes, 'aprovacoes');
  watch(COLS.manutencoes, 'manutencoes');
  watch(COLS.pecas, 'pecas');
  watch(COLS.oficinas, 'oficinas');
  watch(COLS.fornecedores, 'fornecedores');
}

// ─── EXPOSED FIREBASE OPS (called from inline onclick handlers) ───────────────
window._fb = {
  save: fbSave,
  del: fbDelete,
  saveMeta: fbSaveMeta,
  cols: COLS
};

// Start loading
loadAllData();

function nextOS(){

}
function getVeiculo(placa){return state.veiculos.find(v=>v.placa===placa)||{}}
function getStatusBadge(s){

function renderCotacoes(){
  const groups={};
  state.cotacoes.forEach(c=>{

    if(!groups[k])groups[k]=[];
    groups[k].push(c);
  });
  Object.values(groups).forEach(g=>{
    const min=Math.min(...g.map(x=>+x.valor));
    g.forEach(x=>{x._sugerido=(+x.valor===min)});
  });
  const rows=state.cotacoes.map(c=>`
    <tr class="${c._sugerido?'suggested':''}">
      <td><strong>${c.os}</strong></td>
      <td>${c.peca}</td>
      <td>${c.fornecedor}</td>
      <td><strong>${fmt(c.valor)}</strong></td>
      <td>${c.prazo} dias</td>
      <td>${c.pgto}</td>

async function saveOficina(){

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function renderDashboard(){
  const os=state.os;
  const manuts=state.manutencoes;
  const statusCounts={};
  os.forEach(o=>{statusCounts[o.status]=(statusCounts[o.status]||0)+1});
  const total=os.length;
  const totalGasto=manuts.reduce((a,m)=>a+(+m.vlrPecas||0)+(+m.vlrMO||0),0);
  const avgVeic=state.veiculos.length?totalGasto/state.veiculos.length:0;
  const maiorOS=Math.max(0,...manuts.map(m=>(+m.vlrPecas||0)+(+m.vlrMO||0)));
  const gastoByPlaca={};
  os.forEach(o=>{
    const m=manuts.filter(x=>x.os===o.num);
    const g=m.reduce((a,x)=>a+(+x.vlrPecas||0)+(+x.vlrMO||0),0);
    gastoByPlaca[o.placa]=(gastoByPlaca[o.placa]||0)+g;
  });
  const top5=Object.entries(gastoByPlaca).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxGasto=top5[0]?top5[0][1]:1;
  const rankClasses=['r1','r2','r3','',''];
  const top5Html=top5.length?top5.map(([placa,gasto],i)=>{
    const v=getVeiculo(placa);
    const pct=Math.round((gasto/maxGasto)*100);
    return `<div class="top5-item">
      <div class="top5-rank ${rankClasses[i]}">${i+1}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div><strong>${placa}</strong> <span style="font-size:12px;color:var(--gray)">${v.modelo||''}</span></div>
          <strong style="color:var(--green)">${fmt(gasto)}</strong>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join(''):`<div class="empty-state"><div class="empty-icon">🏎</div><p>Nenhum dado disponível</p></div>`;
  const statusList=[
    {s:'Aberta',c:'badge-gray'},{s:'Diagnóstico/Oficina',c:'badge-red'},{s:'Cotação',c:'badge-purple'},
    {s:'Aguardando Aprovação',c:'badge-amber'},{s:'Aprovada',c:'badge-blue'},{s:'Execução',c:'badge-blue'},
    {s:'Concluída',c:'badge-green'},{s:'Cancelada',c:'badge-gray'}
  ];
  const statusRows=statusList.map(({s,c})=>{
    const q=statusCounts[s]||0;
    const p=total?Math.round((q/total)*100):0;
    return `<tr><td><span class="badge ${c}">${s}</span></td><td><strong>${q}</strong></td><td>${p}%</td></tr>`;
  }).join('');
  return `
    <div class="topbar"><div><div class="page-title">📊 Dashboard Executivo</div><div class="page-sub">Responsável: Anselmo · Visão gerencial completa</div></div></div>
    <div class="content">
      <div class="card" style="margin-bottom:16px">
        <div class="card-title" style="margin-bottom:12px">▸ Indicadores Operacionais</div>
        <div class="kpi-grid">
          <div class="kpi"><div class="kpi-label">OS Abertas</div><div class="kpi-val" style="color:var(--gray)">${statusCounts['Aberta']||0}</div></div>
          <div class="kpi"><div class="kpi-label">Diagnóstico</div><div class="kpi-val" style="color:var(--red)">${statusCounts['Diagnóstico/Oficina']||0}</div></div>
          <div class="kpi"><div class="kpi-label">Em Execução</div><div class="kpi-val" style="color:var(--blue)">${statusCounts['Execução']||0}</div></div>
          <div class="kpi"><div class="kpi-label">Concluídas</div><div class="kpi-val" style="color:var(--green)">${statusCounts['Concluída']||0}</div></div>
          <div class="kpi"><div class="kpi-label">Canceladas</div><div class="kpi-val" style="color:var(--gray)">${statusCounts['Cancelada']||0}</div></div>
          <div class="kpi"><div class="kpi-label">Total OS</div><div class="kpi-val" style="color:var(--header)">${total}</div></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-title" style="margin-bottom:12px">▸ Indicadores Financeiros</div>
        <div class="kpi-grid">
          <div class="kpi"><div class="kpi-label">💰 Gasto Total</div><div class="kpi-val" style="color:var(--green);font-size:18px">${fmt(totalGasto)}</div></div>
          <div class="kpi"><div class="kpi-label">📊 Média / Veículo</div><div class="kpi-val" style="color:var(--blue);font-size:18px">${fmt(avgVeic.toFixed(2))}</div></div>
          <div class="kpi"><div class="kpi-label">🔺 Maior OS</div><div class="kpi-val" style="color:var(--amber);font-size:18px">${fmt(maiorOS)}</div></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div class="card">
          <div class="card-title" style="margin-bottom:12px">▸ Resumo por Status</div>
          <table style="width:100%"><thead><tr><th>Status</th><th>Qtde</th><th>%</th></tr></thead><tbody>${statusRows}</tbody></table>
        </div>
        <div class="card">
          <div class="card-title" style="margin-bottom:12px">▸ Regras de Aprovação</div>
          <table style="width:100%"><thead><tr><th>Valor</th><th>Aprovador</th></tr></thead><tbody>
            <tr><td>Até R$ 50,00</td><td><span class="badge badge-blue">✅ Júlio</span></td></tr>
            <tr><td>Acima de R$ 50,00</td><td><span class="badge badge-purple">🔐 Anselmo</span></td></tr>
          </tbody></table>
        </div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">🏆 Top 5 — Veículos que mais gastaram</div>
        ${top5Html}
      </div>
    </div>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  if(!state._loaded) return;
  const pages={
    home:renderHome, os:renderOS, veiculos:renderVeiculos,
    cotacoes:renderCotacoes, aprovacoes:renderAprovacoes,
    manutencoes:renderManutencoes, pecas:renderPecas,
    historico:renderHistorico, oficinas:renderOficinas,
    fornecedores:renderFornecedores, dashboard:renderDashboard
  };
  const fn=pages[state.page]||renderHome;
  document.getElementById('main-content').innerHTML=fn();
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page===state.page);
  });
}
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-logo">🚗</div>
  <div class="loading-title">STAYNET</div>
  <div class="loading-sub">Conectando ao Firebase...</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div class="app" id="app" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="brand">🚗 STAYNET</div>
      <div class="sub">Gestão de Frota</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <div class="nav-item" data-page="home" onclick="go('home')"><span class="icon">🏠</span> Home</div>
      <div class="nav-section">Operacional</div>
      <div class="nav-item" data-page="os" onclick="go('os')"><span class="icon">📋</span> Ordens de Serviço</div>
      <div class="nav-item" data-page="cotacoes" onclick="go('cotacoes')"><span class="icon">💰</span> Cotações</div>
      <div class="nav-item" data-page="aprovacoes" onclick="go('aprovacoes')"><span class="icon">✅</span> Aprovações</div>
      <div class="nav-item" data-page="manutencoes" onclick="go('manutencoes')"><span class="icon">🔧</span> Manutenções</div>
      <div class="nav-section">Cadastros</div>
      <div class="nav-item" data-page="veiculos" onclick="go('veiculos')"><span class="icon">🚙</span> Veículos</div>
      <div class="nav-item" data-page="oficinas" onclick="go('oficinas')"><span class="icon">🏭</span> Oficinas</div>
      <div class="nav-item" data-page="fornecedores" onclick="go('fornecedores')"><span class="icon">🏪</span> Fornecedores</div>
      <div class="nav-section">Consultas</div>
      <div class="nav-item" data-page="historico" onclick="go('historico')"><span class="icon">📂</span> Histórico</div>
    </nav>
  </div>
  <div class="main" id="main-content"></div>
</div>

<!-- Firebase sync status indicator -->
<div class="fb-status" id="fb-status">
  <div class="fb-dot" id="fb-dot"></div>
  <span id="fb-msg">Firebase</span>
</div>

<div id="modal-root"></div>
<div id="lock-root"></div>

<!-- Firebase SDK via CDN (modular compat) -->
<script type="module" src="firebase.js"></script>

<!-- SheetJS (exportação Excel) -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<!-- App JS -->
<script src="app.js"></script>

</body>
</html>
